<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>直邮管家 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#1a1a2e 0,#16213e 40%,#0f3460 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.login-box{
  background:#fff;
  border-radius:16px;
  padding:40px 36px;
  width:380px;
  max-width:92vw;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  animation:fadeIn .5s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-box h1{
  font-size:22px;
  color:#0f3460;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:10px;
}
.login-box .subtitle{
  font-size:13px;
  color:#888;
  margin-bottom:28px;
}
.form-group{margin-bottom:18px}
.form-group label{
  display:block;
  font-size:13px;
  color:#555;
  margin-bottom:6px;
  font-weight:500;
}
.form-group input{
  width:100%;
  padding:12px 14px;
  border:1.5px solid #e0e0e0;
  border-radius:10px;
  font-size:15px;
  outline:none;
  transition:border-color .2s;
}
.form-group input:focus{border-color:#0f3460}
.login-btn{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#0f3460,#16213e);
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:opacity .2s;
}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:default}
.error-msg{
  color:#dc2626;
  font-size:13px;
  margin-top:12px;
  text-align:center;
  display:none;
}
.footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>
<body>
<div class="login-box">
  <h1>📦 直邮管家</h1>
  <div class="subtitle">德国直邮 · 聚水潭推单系统</div>
  <form id="login-form" onsubmit="return doLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autofocus required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="login-btn" id="login-btn">登 录</button>
    <div class="error-msg" id="error-msg"></div>
  </form>
  <div class="footer">直邮管家 v3.0</div>
</div>
<script>
async function doLogin(e){
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  btn.textContent = '⏳ 登录中...';
  btn.disabled = true;
  err.style.display = 'none';
  try{
    const r = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data = await r.json();
    if(data.success){
      window.location.href = '/';
    }else{
      err.textContent = data.msg || '登录失败';
      err.style.display = 'block';
    }
  }catch(e){
    err.textContent = '网络错误，请重试';
    err.style.display = 'block';
  }finally{
    btn.textContent = '登 录';
    btn.disabled = false;
  }
  return false;
}
// 回车提交
document.getElementById('password').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('login-form').dispatchEvent(new Event('submit'));
});
</script>
</body>
</html>
